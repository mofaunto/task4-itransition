version: '3.8'

services:
  # Backend and Frontend run locally during development (npm run dev)
  # backend:
  #   build: ./backend
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - DATABASE_URL=postgresql://user:password@localhost:5433/user_management?schema=public
  #     - JWT_SECRET=${JWT_SECRET:-my-secret-jwt-key-change-in-production}

  # frontend:
  #   build: ./frontend
  #   ports:
  #     - "5173:5173"

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: user_management
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: